apiVersion: apps/v1
kind: Deployment
metadata:
  name: traefik-dashboard
  namespace: traefik-dashboard
  labels:
    app.kubernetes.io/name: dashboard
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: traefik-log-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dashboard
        app.kubernetes.io/component: frontend
        app.kubernetes.io/part-of: traefik-log-dashboard
    spec:
      initContainers:
        - name: wait-for-agent
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for agent..."
              until wget -qO- http://traefik-agent:5000/api/logs/status >/dev/null 2>&1; do
                sleep 2
              done
              echo "Agent is ready."
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      containers:
        - name: dashboard
          image: hhftechnology/traefik-log-dashboard:latest
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: dashboard-config
          env:
            - name: AGENT_1_TOKEN
              valueFrom:
                secretKeyRef:
                  name: traefik-dashboard-auth
                  key: auth-token
          volumeMounts:
            - name: dashboard-data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: dashboard-data
          persistentVolumeClaim:
            claimName: dashboard-data
