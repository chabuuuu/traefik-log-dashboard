apiVersion: v1
kind: Service
metadata:
  name: traefik-dashboard
  namespace: traefik-dashboard
  labels:
    app.kubernetes.io/name: dashboard
    app.kubernetes.io/part-of: traefik-log-dashboard
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: dashboard
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
