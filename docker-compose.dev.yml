services:
  # Traefik Log Dashboard Agent
  traefik-agent:
    image: golang:1.23-alpine
    container_name: traefik-log-dashboard-agent-dev
    restart: "no"
    working_dir: /app
    volumes:
      - ./agent:/app
      - ./data/logs:/logs:ro
      - ./data/positions:/data
    command: sh -c "go mod tidy && go run cmd/agent/main.go"
    ports:
      - "5000:5000"
    environment:
      # Log Paths
      - TRAEFIK_LOG_DASHBOARD_ACCESS_PATH=/logs/access.log
      - TRAEFIK_LOG_DASHBOARD_ERROR_PATH=/logs/traefik.log

      # Authentication - REPLACE WITH YOUR TOKEN
      - TRAEFIK_LOG_DASHBOARD_AUTH_TOKEN=d41d8cd98f00b204e9800998ecf8427e

      # System Monitoring
      - TRAEFIK_LOG_DASHBOARD_SYSTEM_MONITORING=true

      # Log Format
      - TRAEFIK_LOG_DASHBOARD_LOG_FORMAT=json

      # Server Port
      - PORT=5000
    networks:
      - traefik-network-dev

  # Traefik Log Dashboard - Node.js + Vite SPA
  traefik-dashboard:
    image: node:20-alpine
    container_name: traefik-log-dashboard-dev
    restart: "no"
    working_dir: /app
    volumes:
      - ./dashboard:/app
      - dashboard-data-dev:/data
    command: sh -c "npm install && npm run build:server && PORT=3001 node dist-server/index.js & VITE_PROXY_TARGET=http://127.0.0.1:3001 npm run dev -- --host"
    ports:
      - "3000:3000"
    environment:
      # Vite Proxy Target (so Vite knows where to forward /api requests)
      - VITE_PROXY_TARGET=http://127.0.0.1:3001

      # Environment-managed agents (supports AGENT_1_*, AGENT_2_*, ...)
      - AGENT_1_NAME=Primary Agent
      - AGENT_1_URL=http://traefik-agent:5000
      - AGENT_1_TOKEN=d41d8cd98f00b204e9800998ecf8427e
      
      # Lock agent configuration to environment-only mode
      - DASHBOARD_AGENTS_ENV_ONLY=true

      # Dashboard behavior
      - DASHBOARD_TRAFFIC_TOP_ITEMS_LIMIT=25
      - DASHBOARD_PARSER_TREND_WINDOW_MINUTES=30
    depends_on:
      - traefik-agent
    networks:
      - traefik-network-dev

volumes:
  dashboard-data-dev:

networks:
  traefik-network-dev:
    driver: bridge
