apiVersion: apps/v1
kind: Deployment
metadata:
  name: traefik-dashboard
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "traefik-log-dashboard.dashboard.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.dashboard.replicaCount }}
  selector:
    matchLabels:
      {{- include "traefik-log-dashboard.dashboard.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "traefik-log-dashboard.dashboard.selectorLabels" . | nindent 8 }}
    spec:
      initContainers:
        - name: wait-for-agent
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for agent..."
              until wget -qO- http://traefik-agent:{{ .Values.agent.service.port }}/api/logs/status >/dev/null 2>&1; do
                sleep 2
              done
              echo "Agent is ready."
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      containers:
        - name: dashboard
          image: "{{ .Values.dashboard.image.repository }}:{{ .Values.dashboard.image.tag }}"
          imagePullPolicy: {{ .Values.dashboard.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.dashboard.service.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: dashboard-config
          env:
            - name: AGENT_1_TOKEN
              valueFrom:
                secretKeyRef:
                  name: traefik-dashboard-auth
                  key: auth-token
          volumeMounts:
            {{- if .Values.dashboard.persistence.enabled }}
            - name: dashboard-data
              mountPath: /data
            {{- end }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          {{- with .Values.dashboard.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        {{- if .Values.dashboard.persistence.enabled }}
        - name: dashboard-data
          persistentVolumeClaim:
            claimName: dashboard-data
        {{- end }}
