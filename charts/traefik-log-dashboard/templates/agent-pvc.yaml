{{- if .Values.agent.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: agent-position-data
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "traefik-log-dashboard.agent.labels" . | nindent 4 }}
spec:
  accessModes: [ReadWriteOnce]
  {{- if .Values.agent.persistence.storageClass }}
  storageClassName: {{ .Values.agent.persistence.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.agent.persistence.size }}
{{- end }}
