apiVersion: v1
kind: Service
metadata:
  name: traefik-agent
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "traefik-log-dashboard.agent.labels" . | nindent 4 }}
spec:
  type: {{ .Values.agent.service.type }}
  selector:
    {{- include "traefik-log-dashboard.agent.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.agent.service.port }}
      targetPort: http
      protocol: TCP
