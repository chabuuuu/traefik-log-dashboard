apiVersion: v1
kind: Service
metadata:
  name: traefik-dashboard
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "traefik-log-dashboard.dashboard.labels" . | nindent 4 }}
spec:
  type: {{ .Values.dashboard.service.type }}
  selector:
    {{- include "traefik-log-dashboard.dashboard.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.dashboard.service.port }}
      targetPort: http
      protocol: TCP
