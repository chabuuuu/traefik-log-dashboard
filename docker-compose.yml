services:
  # Traefik Log Dashboard Agent
  traefik-agent:
    image: hhftechnology/traefik-log-dashboard-agent:dev-dashboard
    container_name: traefik-log-dashboard-agent
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./data/logs:/logs:ro
      - ./data/positions:/data
    environment:
      # Log Paths
      - TRAEFIK_LOG_DASHBOARD_ACCESS_PATH=/logs/access.log
      - TRAEFIK_LOG_DASHBOARD_ERROR_PATH=/logs/access.log

      # Authentication - REPLACE WITH YOUR TOKEN
      - TRAEFIK_LOG_DASHBOARD_AUTH_TOKEN=d41d8cd98f00b204e9800998ecf8427e

      # System Monitoring
      - TRAEFIK_LOG_DASHBOARD_SYSTEM_MONITORING=true

      # Log Format
      - TRAEFIK_LOG_DASHBOARD_LOG_FORMAT=json

      # Server Port
      - PORT=5000
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/logs/status"]
      interval: 2m
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - traefik-network

  # Traefik Log Dashboard - Node.js + Vite SPA
  traefik-dashboard:
    image: hhftechnology/traefik-log-dashboard:dev-dashboard
    container_name: traefik-log-dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - dashboard-data:/data
    environment:
      # Environment-managed agents (supports AGENT_1_*, AGENT_2_*, ...)
      - AGENT_1_NAME=Primary Agent
      - AGENT_1_URL=http://traefik-agent:5000
      - AGENT_1_TOKEN=d41d8cd98f00b204e9800998ecf8427e
      # Optional second agent example:
      # - AGENT_2_NAME=Staging Agent
      # - AGENT_2_URL=http://traefik-agent-staging:5000
      # - AGENT_2_TOKEN=another-token

      # Lock agent configuration to environment-only mode
      - DASHBOARD_AGENTS_ENV_ONLY=true

      # Dashboard behavior
      - DASHBOARD_TRAFFIC_TOP_ITEMS_LIMIT=25
      - DASHBOARD_PARSER_TREND_WINDOW_MINUTES=30
    depends_on:
      traefik-agent:
        condition: service_healthy
    networks:
      - traefik-network

volumes:
  dashboard-data:

networks:
  traefik-network:
    external: true
