name: Build and Publish

on:
  push:
    branches:
      - main
      - dev-dashboard
    tags:
      - 'v*'
    paths:
      - 'agent/**'
      - 'dashboard/**'
      - 'cli/**'
      - 'docker-compose.yml'
      - '.github/workflows/build-and-publish.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'agent/**'
      - 'dashboard/**'
      - 'cli/**'
      - 'docker-compose.yml'
      - '.github/workflows/build-and-publish.yml'
  workflow_dispatch:
    inputs:
      release_cli:
        description: 'Build CLI binaries (and use in release if running on a v* tag)'
        required: false
        type: boolean
        default: false

concurrency:
  group: build-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY_GHCR: ghcr.io
  REGISTRY_DOCKERHUB: docker.io
  GO_VERSION: '1.23'

jobs:
  prepare:
    name: Detect Changed Areas
    runs-on: ubuntu-latest
    outputs:
      agent_changed: ${{ steps.changes.outputs.agent }}
      dashboard_changed: ${{ steps.changes.outputs.dashboard }}
      cli_changed: ${{ steps.changes.outputs.cli }}
      compose_changed: ${{ steps.changes.outputs.compose }}
      workflow_changed: ${{ steps.changes.outputs.workflow }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect file changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            agent:
              - 'agent/**'
            dashboard:
              - 'dashboard/**'
            cli:
              - 'cli/**'
            compose:
              - 'docker-compose.yml'
            workflow:
              - '.github/workflows/build-and-publish.yml'

  validate-compose:
    name: Validate Compose
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate docker-compose syntax
        run: |
          docker compose -f docker-compose.yml config > /tmp/compose.rendered.yml
          echo "Validated docker-compose.yml"

  build-agent:
    name: Build Agent Image
    runs-on: ubuntu-latest
    needs: [prepare, validate-compose]
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      needs.prepare.outputs.agent_changed == 'true' ||
      needs.prepare.outputs.compose_changed == 'true' ||
      needs.prepare.outputs.workflow_changed == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to DockerHub
        if: github.event_name != 'pull_request' && secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_DOCKERHUB }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/traefik-log-dashboard-agent
            docker.io/hhftechnology/traefik-log-dashboard-agent
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Agent image
        uses: docker/build-push-action@v6
        with:
          context: ./agent
          file: ./agent/Dockerfile
          pull: true
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=agent
          cache-to: type=gha,mode=max,scope=agent

  build-dashboard:
    name: Build Dashboard Image
    runs-on: ubuntu-latest
    needs: [prepare, validate-compose]
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      needs.prepare.outputs.dashboard_changed == 'true' ||
      needs.prepare.outputs.compose_changed == 'true' ||
      needs.prepare.outputs.workflow_changed == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to DockerHub
        if: github.event_name != 'pull_request' && secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_DOCKERHUB }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/traefik-log-dashboard
            docker.io/hhftechnology/traefik-log-dashboard
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Dashboard image
        uses: docker/build-push-action@v6
        with:
          context: ./dashboard
          file: ./dashboard/Dockerfile
          pull: true
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=dashboard
          cache-to: type=gha,mode=max,scope=dashboard
          build-args: |
            VITE_BASE_PATH=/

  build-cli-binaries:
    name: Build CLI Binaries
    runs-on: ubuntu-latest
    needs: prepare
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.release_cli == 'true') ||
      needs.prepare.outputs.cli_changed == 'true' ||
      needs.prepare.outputs.workflow_changed == 'true'
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: ""
          - goos: linux
            goarch: arm64
            suffix: ""
          - goos: linux
            goarch: arm
            goarm: "7"
            suffix: ""
          - goos: linux
            goarch: "386"
            suffix: ""
          - goos: darwin
            goarch: amd64
            suffix: ""
          - goos: darwin
            goarch: arm64
            suffix: ""
          - goos: windows
            goarch: amd64
            suffix: ".exe"
          - goos: windows
            goarch: arm64
            suffix: ".exe"
          - goos: windows
            goarch: "386"
            suffix: ".exe"
          - goos: freebsd
            goarch: amd64
            suffix: ""
          - goos: freebsd
            goarch: arm64
            suffix: ""
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: cli/go.sum

      - name: Resolve version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="${{ github.ref_name }}-$(echo "${{ github.sha }}" | cut -c1-8)"
          fi
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build CLI binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          cd cli
          VERSION="${{ steps.version.outputs.value }}"
          BINARY_NAME="traefik-log-dashboard-cli"
          OUTPUT_NAME="${BINARY_NAME}-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}"

          if [[ -n "${{ matrix.goarm }}" ]]; then
            OUTPUT_NAME="${OUTPUT_NAME}v${{ matrix.goarm }}"
          fi

          OUTPUT_NAME="${OUTPUT_NAME}${{ matrix.suffix }}"

          go build -v \
            -ldflags="-X 'main.Version=${VERSION}' -X 'main.Commit=${{ github.sha }}' -X 'main.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)' -s -w" \
            -o "../dist/${OUTPUT_NAME}" \
            ./cmd/traefik-log-dashboard

          cd ../dist
          sha256sum "${OUTPUT_NAME}" > "${OUTPUT_NAME}.sha256"

      - name: Upload CLI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goarm }}
          path: |
            dist/traefik-log-dashboard-cli-*
          retention-days: 7

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-agent, build-dashboard, build-cli-binaries]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all CLI artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: cli-*
          merge-multiple: true

      - name: Create release notes
        run: |
          VERSION="${{ github.ref_name }}"
          cat > release_notes.md << EOF
          # Traefik Log Dashboard ${VERSION}

          ## Docker Images

          ### Agent
          - \`docker pull hhftechnology/traefik-log-dashboard-agent:${VERSION}\`
          - \`docker pull ghcr.io/${{ github.repository_owner }}/traefik-log-dashboard-agent:${VERSION}\`

          ### Dashboard
          - \`docker pull hhftechnology/traefik-log-dashboard:${VERSION}\`
          - \`docker pull ghcr.io/${{ github.repository_owner }}/traefik-log-dashboard:${VERSION}\`

          ## CLI Binaries

          Download the matching binary from release assets.

          ## Docker Compose (current runtime env model)

          \`\`\`yaml
          services:
            traefik-agent:
              image: hhftechnology/traefik-log-dashboard-agent:${VERSION}
              ports:
                - "5000:5000"
              environment:
                - TRAEFIK_LOG_DASHBOARD_ACCESS_PATH=/logs/access.log
                - TRAEFIK_LOG_DASHBOARD_AUTH_TOKEN=replace-with-token

            traefik-dashboard:
              image: hhftechnology/traefik-log-dashboard:${VERSION}
              ports:
                - "3000:3000"
              environment:
                - AGENT_1_NAME=Primary Agent
                - AGENT_1_URL=http://traefik-agent:5000
                - AGENT_1_TOKEN=replace-with-token
                - DASHBOARD_AGENTS_ENV_ONLY=true
          \`\`\`
          EOF

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          name: Release ${{ github.ref_name }}
          body_path: release_notes.md
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [prepare, validate-compose, build-agent, build-dashboard, build-cli-binaries]
    if: always()
    steps:
      - name: Write summary
        run: |
          echo "## Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Component | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Compose validation | ${{ needs.validate-compose.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Agent image | ${{ needs.build-agent.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Dashboard image | ${{ needs.build-dashboard.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| CLI binaries | ${{ needs.build-cli-binaries.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Change detection" >> "$GITHUB_STEP_SUMMARY"
          echo "- agent changed: \`${{ needs.prepare.outputs.agent_changed }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- dashboard changed: \`${{ needs.prepare.outputs.dashboard_changed }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- cli changed: \`${{ needs.prepare.outputs.cli_changed }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- compose changed: \`${{ needs.prepare.outputs.compose_changed }}\`" >> "$GITHUB_STEP_SUMMARY"
