name: Build and Release

on:
  push:
    branches:
      - main
      - dev-dashboard
    paths:
      - 'agent/**'
      - 'dashboard/**'
      - 'cli/**'
      - '.github/workflows/**'
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_cli:
        description: 'Release CLI binaries'
        required: false
        type: boolean
        default: false

env:
  REGISTRY_GHCR: ghcr.io
  REGISTRY_DOCKERHUB: docker.io
  GO_VERSION: '1.23'
  NODE_VERSION: '20'

jobs:
  # Build and push Agent Docker image
  build-agent:
    runs-on: ubuntu-latest
    outputs:
      image_size_human: ${{ steps.image_size.outputs.size_human }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_DOCKERHUB }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/traefik-log-dashboard-agent
            docker.io/hhftechnology/traefik-log-dashboard-agent
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'YYYYMMDD'}}-{{sha}}
          
      - name: Build and push Agent
        uses: docker/build-push-action@v5
        with:
          context: ./agent
          file: ./agent/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=agent
          cache-to: type=gha,mode=max,scope=agent
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}

      - name: Build agent image for size calculation (linux/amd64)
        if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/heads/')
        continue-on-error: true
        uses: docker/build-push-action@v5
        with:
          context: ./agent
          file: ./agent/Dockerfile
          push: false
          load: true
          tags: local/traefik-log-dashboard-agent:size-${{ github.sha }}
          cache-from: type=gha,scope=agent
          platforms: linux/amd64
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}

      - name: Calculate agent image size
        if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/heads/')
        id: image_size
        continue-on-error: true
        shell: bash
        run: |
          IMAGE_REF="local/traefik-log-dashboard-agent:size-${{ github.sha }}"
          SIZE_BYTES="$(docker image inspect "${IMAGE_REF}" --format='{{.Size}}' 2>/dev/null || true)"
          if [ -n "${SIZE_BYTES}" ]; then
            SIZE_HUMAN="$(numfmt --to=iec --suffix=B "${SIZE_BYTES}")"
          else
            SIZE_HUMAN=""
          fi
          if [ -n "${SIZE_HUMAN}" ]; then
            echo "Computed agent image size: ${SIZE_HUMAN}"
            echo "size_human=${SIZE_HUMAN}" >> "${GITHUB_OUTPUT}"
          else
            echo "Agent image size calculation skipped or failed"
          fi

  # Build and push Dashboard Docker image
  build-dashboard:
    runs-on: ubuntu-latest
    outputs:
      image_size_human: ${{ steps.image_size.outputs.size_human }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_DOCKERHUB }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/traefik-log-dashboard
            docker.io/hhftechnology/traefik-log-dashboard
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'YYYYMMDD'}}-{{sha}}
          
      - name: Build and push Dashboard
        uses: docker/build-push-action@v5
        with:
          context: ./dashboard
          file: ./dashboard/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=dashboard
          cache-to: type=gha,mode=max,scope=dashboard
          build-args: |
            NEXT_PUBLIC_API_URL=/api

      - name: Build dashboard image for size calculation (linux/amd64)
        if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/heads/')
        continue-on-error: true
        uses: docker/build-push-action@v5
        with:
          context: ./dashboard
          file: ./dashboard/Dockerfile
          push: false
          load: true
          tags: local/traefik-log-dashboard:size-${{ github.sha }}
          cache-from: type=gha,scope=dashboard
          platforms: linux/amd64
          build-args: |
            NEXT_PUBLIC_API_URL=/api

      - name: Calculate dashboard image size
        if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/heads/')
        id: image_size
        continue-on-error: true
        shell: bash
        run: |
          IMAGE_REF="local/traefik-log-dashboard:size-${{ github.sha }}"
          SIZE_BYTES="$(docker image inspect "${IMAGE_REF}" --format='{{.Size}}' 2>/dev/null || true)"
          if [ -n "${SIZE_BYTES}" ]; then
            SIZE_HUMAN="$(numfmt --to=iec --suffix=B "${SIZE_BYTES}")"
          else
            SIZE_HUMAN=""
          fi
          if [ -n "${SIZE_HUMAN}" ]; then
            echo "Computed dashboard image size: ${SIZE_HUMAN}"
            echo "size_human=${SIZE_HUMAN}" >> "${GITHUB_OUTPUT}"
          else
            echo "Dashboard image size calculation skipped or failed"
          fi

  commit-readme-image-sizes:
    runs-on: ubuntu-latest
    needs: [build-agent, build-dashboard]
    if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/heads/')
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Update README image sizes
        shell: bash
        run: |
          AGENT_SIZE="${{ needs.build-agent.outputs.image_size_human }}"
          DASHBOARD_SIZE="${{ needs.build-dashboard.outputs.image_size_human }}"
          if [ -n "${AGENT_SIZE}" ]; then
            sed -i -E "s|(<!-- AGENT_IMAGE_SIZE_START -->)[^<]*(<!-- AGENT_IMAGE_SIZE_END -->)|\1${AGENT_SIZE}\2|" README.md
          else
            echo "Agent image size output is empty; leaving README marker unchanged"
          fi
          if [ -n "${DASHBOARD_SIZE}" ]; then
            sed -i -E "s|(<!-- DASHBOARD_IMAGE_SIZE_START -->)[^<]*(<!-- DASHBOARD_IMAGE_SIZE_END -->)|\1${DASHBOARD_SIZE}\2|" README.md
          else
            echo "Dashboard image size output is empty; leaving README marker unchanged"
          fi

      - name: Commit README image size update
        shell: bash
        run: |
          git fetch origin "${{ github.ref_name }}"
          REMOTE_SHA="$(git rev-parse FETCH_HEAD)"
          if [ "${REMOTE_SHA}" != "${{ github.sha }}" ]; then
            echo "Remote branch moved to ${REMOTE_SHA}; refusing to push README update based on stale commit ${{ github.sha }}"
            exit 0
          fi
          if git diff --quiet -- README.md; then
            echo "README image sizes are already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          cat > /tmp/readme-image-size-commit-msg <<'EOF'
          Record current container image sizes in the root README

          Automated branch update after calculating linux/amd64 sizes for the published agent and dashboard images.

          Constraint: CI updates only README.md on branch pushes
          Confidence: high
          Scope-risk: narrow
          Directive: Keep the README size markers stable or the workflow replacement step will fail
          Tested: Marker replacement, README-only diff check, and remote SHA guard in workflow
          Not-tested: Branch protection rules that reject bot pushes
          EOF
          git commit -F /tmp/readme-image-size-commit-msg
          git push origin HEAD:${{ github.ref_name }}

  # Build CLI binaries for multiple platforms
  build-cli-binaries:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          # Linux builds
          - goos: linux
            goarch: amd64
            suffix: ""
          - goos: linux
            goarch: arm64
            suffix: ""
          - goos: linux
            goarch: arm
            goarm: "7"
            suffix: ""
          - goos: linux
            goarch: "386"
            suffix: ""
          
          # macOS builds
          - goos: darwin
            goarch: amd64
            suffix: ""
          - goos: darwin
            goarch: arm64
            suffix: ""
          
          # Windows builds
          - goos: windows
            goarch: amd64
            suffix: ".exe"
          - goos: windows
            goarch: arm64
            suffix: ".exe"
          - goos: windows
            goarch: "386"
            suffix: ".exe"
          
          # FreeBSD builds
          - goos: freebsd
            goarch: amd64
            suffix: ""
          - goos: freebsd
            goarch: arm64
            suffix: ""

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: cli/go.sum
        
      - name: Get version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="${{ github.ref_name }}-$(echo ${{ github.sha }} | cut -c1-8)"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"
        
      - name: Build CLI binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: 0
        run: |
          cd cli
          VERSION="${{ steps.version.outputs.version }}"
          BINARY_NAME="traefik-log-dashboard-cli"
          OUTPUT_NAME="${BINARY_NAME}-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}"
          
          # Add ARM version to filename if applicable
          if [ -n "${{ matrix.goarm }}" ]; then
            OUTPUT_NAME="${OUTPUT_NAME}v${{ matrix.goarm }}"
          fi
          
          OUTPUT_NAME="${OUTPUT_NAME}${{ matrix.suffix }}"
          
          echo "Building ${OUTPUT_NAME}..."
          
          go build -v \
            -ldflags="-X 'main.Version=${VERSION}' -X 'main.Commit=${{ github.sha }}' -X 'main.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)' -s -w" \
            -o "../dist/${OUTPUT_NAME}" \
            ./cmd/traefik-log-dashboard
          
          # Create checksum
          cd ../dist
          sha256sum "${OUTPUT_NAME}" > "${OUTPUT_NAME}.sha256"
          
      - name: Upload CLI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goarm }}
          path: dist/*
          retention-days: 7

  # Create GitHub Release with all binaries
  create-release:
    runs-on: ubuntu-latest
    needs: [build-agent, build-dashboard, build-cli-binaries]
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.release_cli == true
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Download all CLI artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: cli-*
          merge-multiple: true
          
      - name: List artifacts
        run: |
          echo "Downloaded artifacts:"
          ls -la dist/
          
      - name: Create Release Notes
        id: release_notes
        run: |
          VERSION="${{ github.ref_name }}"
          cat > release_notes.md << EOF
          # Traefik Log Dashboard ${VERSION}
          
          ## 🐳 Docker Images
          
          ### Agent
          - \`docker pull hhftechnology/traefik-log-dashboard-agent:${VERSION}\`
          - \`docker pull ghcr.io/${{ github.repository_owner }}/traefik-log-dashboard-agent:${VERSION}\`
          
          ### Dashboard
          - \`docker pull hhftechnology/traefik-log-dashboard:${VERSION}\`
          - \`docker pull ghcr.io/${{ github.repository_owner }}/traefik-log-dashboard:${VERSION}\`
          
          ## 💻 CLI Binaries
          
          Download the appropriate binary for your platform from the assets below.
          
          ### Installation
          
          \`\`\`bash
          # Linux/macOS
          wget https://github.com/${{ github.repository }}/releases/download/${VERSION}/traefik-log-dashboard-cli-${VERSION}-linux-amd64
          chmod +x traefik-log-dashboard-cli-${VERSION}-linux-amd64
          sudo mv traefik-log-dashboard-cli-${VERSION}-linux-amd64 /usr/local/bin/traefik-log-dashboard
          
          # Windows
          # Download the .exe file and add to PATH
          \`\`\`
          
          ## 📋 Changelog
          
          See [CHANGELOG.md](https://traefik-log-dashboard.hhf.technology/docs/changelog) for details.
          
          ## 🔧 Docker Compose
          
          \`\`\`yaml
          services:
            traefik-agent:
              image: hhftechnology/traefik-log-dashboard-agent:${VERSION}
              container_name: traefik-log-dashboard-agent
              restart: unless-stopped
              volumes:
                - /root/config/traefik/logs:/logs:ro
                - ./data/positions:/data
              environment:
                # Log Paths
                - TRAEFIK_LOG_DASHBOARD_ACCESS_PATH=/logs/access.log
                - TRAEFIK_LOG_DASHBOARD_ERROR_PATH=/logs/traefik.log
                # Authentication
                - TRAEFIK_LOG_DASHBOARD_AUTH_TOKEN=d41d8cd98f00b204e9800998ecf8427e
                # System Monitoring
                - TRAEFIK_LOG_DASHBOARD_SYSTEM_MONITORING=true      
              healthcheck:
                test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/logs/status"]
                interval: 30s
                timeout: 10s
                retries: 3
                start_period: 10s   
              ports:
                - "5000:5000"
          
            traefik-dashboard:
              image: hhftechnology/traefik-log-dashboard:${VERSION}
              container_name: traefik-log-dashboard
              restart: unless-stopped
              volumes:
                - ./data/dashboard:/app/data
                - ./data/positions:/data
                - ./data/geoip:/geoip:ro # Mount GeoIP database if using local GeoIP
              environment:
                - AGENT_API_URL=http://traefik-agent:5000
                - AGENT_API_TOKEN=d41d8cd98f00b204e9800998ecf8427e
                - AGENT_NAME=Default Agent
                - ENABLE_BACKGROUND_SCHEDULER=true
                - DASHBOARD_REFRESH_INTERVAL_MS=5000
                - DASHBOARD_MAX_LOGS_DISPLAY=1000
                - SHOW_DEMO_PAGE=true
                - GEOIP_LOCAL_DB_PATH=/geoip/GeoLite2-City.mmdb
                - GEOIP_UNKNOWN_CACHE_TTL_MS=300000
                - NODE_ENV=production
                - MOBILE_API_KEY=d41d8cd98f00b204e9800998ecf8427e #if you have a mobile app, set this to a secure random value and use it in the app to authenticate with the API
              ports:
                - "3000:3000"
              depends_on:
                - traefik-agent
          \`\`\`
          EOF
          
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          name: "Release ${{ github.ref_name }}"
          body_path: release_notes.md
          files: |
            dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Build Summary
  build-summary:
    runs-on: ubuntu-latest
    needs: [build-agent, build-dashboard, build-cli-binaries]
    if: always()
    steps:
      - name: Build Summary
        run: |
          echo "## 🚀 Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Build Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Agent Docker | ${{ needs.build-agent.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dashboard Docker | ${{ needs.build-dashboard.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CLI Binaries | ${{ needs.build-cli-binaries.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### 📦 Docker Images" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
            echo "**Version:** ${VERSION}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "#### Docker Hub" >> $GITHUB_STEP_SUMMARY
            echo "- \`docker pull hhftechnology/traefik-log-dashboard-agent:${VERSION}\`" >> $GITHUB_STEP_SUMMARY
            echo "- \`docker pull hhftechnology/traefik-log-dashboard:${VERSION}\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "#### GitHub Container Registry" >> $GITHUB_STEP_SUMMARY
            echo "- \`docker pull ghcr.io/${{ github.repository_owner }}/traefik-log-dashboard-agent:${VERSION}\`" >> $GITHUB_STEP_SUMMARY
            echo "- \`docker pull ghcr.io/${{ github.repository_owner }}/traefik-log-dashboard:${VERSION}\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
            echo "**SHA:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "#### Latest Images" >> $GITHUB_STEP_SUMMARY
            echo "- \`docker pull hhftechnology/traefik-log-dashboard-agent:${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
            echo "- \`docker pull hhftechnology/traefik-log-dashboard:${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔨 CLI Binaries" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "CLI binaries built for:" >> $GITHUB_STEP_SUMMARY
          echo "- Linux (amd64, arm64, arm/v7, 386)" >> $GITHUB_STEP_SUMMARY
          echo "- macOS (amd64, arm64)" >> $GITHUB_STEP_SUMMARY
          echo "- Windows (amd64, arm64, 386)" >> $GITHUB_STEP_SUMMARY
          echo "- FreeBSD (amd64, arm64)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### 🔗 Links" >> $GITHUB_STEP_SUMMARY
          echo "- [Docker Hub - Agent](https://hub.docker.com/r/hhftechnology/traefik-log-dashboard-agent)" >> $GITHUB_STEP_SUMMARY
          echo "- [Docker Hub - Dashboard](https://hub.docker.com/r/hhftechnology/traefik-log-dashboard)" >> $GITHUB_STEP_SUMMARY
          echo "- [GitHub Packages](https://github.com/${{ github.repository }}/pkgs/container)" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "- [Release Page](https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }})" >> $GITHUB_STEP_SUMMARY
          fi
